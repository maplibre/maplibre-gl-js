<!DOCTYPE html>
<html lang="en">
<head>
    <title>Disable map rotation</title>
    <meta property="og:description" content="Prevent users from rotating a map." />
    <meta property="og:created" content="2025-06-25" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='../../dist/maplibre-gl.css' />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    maplibregl.setWorkerUrl('../../dist/maplibre-gl-worker-dev.mjs');

    const map = new maplibregl.Map({
        container: 'map', // container id
        style: 'https://demotiles.maplibre.org/style.json', // style URL
        center: [-122.65, 45.52], // starting position
        zoom: 3 // starting zoom
    });

    // disable map rotation using right click + drag
    map.dragRotate.disable();

    // disable map rotation using keyboard
    map.keyboard.disable();

    // disable map rotation using touch rotation gesture
    map.touchZoomRotate.disableRotation();
</script>
</body>
</html>
