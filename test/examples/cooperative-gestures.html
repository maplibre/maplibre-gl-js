<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cooperative gestures</title>
    <meta property="og:description" content="Enable cooperative gestures. See how it behaves in fullscreen mode." />
    <meta property="og:created" content="2023-11-22" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='../../dist/maplibre-gl.css' />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>

<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    maplibregl.setWorkerUrl('../../dist/maplibre-gl-worker-dev.mjs');

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-74.5, 40],
        cooperativeGestures: true,
        zoom: 4
    });
    map.addControl(new maplibregl.FullscreenControl());
</script>
</body>
</html>
