<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MapLibre HFOV Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="../../dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="../../dist/maplibre-gl-dev.mjs"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      .controls {
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 5px;
        background: rgba(255, 255, 255, 0.9);
        padding: 5px;
        border-radius: 5px;
      }
      button {
        padding: 5px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="controls">
      <button id="fovWide" type="button">HFOV 40°</button>
      <button id="spin" type="button">360°</button>
      <button id="fovNarrow" type="button">HFOV 10°</button>
    </div>

    <script type="module">
      const map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          sources: {
            esri: {
              type: "raster",
              tiles: [
                "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
              ],
              tileSize: 256,
            },
            terrainSource: {
              type: "raster-dem",
              url: "https://tiles.mapterhorn.com/tilejson.json",
            },
          },
          layers: [{ id: "esri-layer", type: "raster", source: "esri" }],
          terrain: {
            source: "terrainSource",
            exaggeration: 1,
          },
        },
        center: [7.6586, 45.9763],
        zoom: 12,
        pitch: 70,
        bearing: 0,
        maxPitch: 80,
      });

      // ── Smoothstep helper ──
      function smoothstep(t) {
        return t * t * (3 - 2 * t);
      }

      // ── HFOV animation ──
      let fovRaf = null;
      function setHFov(targetDeg) {
        if (!map.setVerticalFieldOfView) {
          alert("MapLibre does not support HFOV!");
          return;
        }
        const startFov = map.getVerticalFieldOfView();
        const startTime = performance.now();
        if (fovRaf) cancelAnimationFrame(fovRaf);

        function tick(now) {
          const t = Math.min((now - startTime) / 800, 1);
          const eased = smoothstep(t);
          map.setVerticalFieldOfView(startFov + (targetDeg - startFov) * eased);
          map.triggerRepaint();
          if (t < 1) fovRaf = requestAnimationFrame(tick);
          else fovRaf = null;
        }
        fovRaf = requestAnimationFrame(tick);
      }

      // ── 360° spin ──
      let spinning = false;
      let rafId = null;
      function toggleSpin() {
        if (spinning) {
          spinning = false;
          map.dragPan.enable();
          if (rafId) cancelAnimationFrame(rafId);
          return;
        }
        spinning = true;
        map.dragPan.disable();
        let last = performance.now();
        const CRUISE_DEG_PER_MS = 360 / 30000;

        function tick(now) {
          const delta = now - last;
          last = now;
          map.setBearing((map.getBearing() + CRUISE_DEG_PER_MS * delta) % 360);
          if (spinning) rafId = requestAnimationFrame(tick);
        }
        rafId = requestAnimationFrame(tick);
      }

      // ── Button handlers ──
      document.getElementById("fovWide").onclick = () => setHFov(40);
      document.getElementById("fovNarrow").onclick = () => setHFov(10);
      document.getElementById("spin").onclick = toggleSpin;
    </script>
  </body>
</html>
