<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cache first layers rendering</title>
    <meta property="og:description" content="Demonstrates the translucent layer cache optimization with a rapidly updating GeoJSON layer on top of static base layers." />
    <meta property="og:created" content="2026-05-13" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='../../dist/maplibre-gl.css' />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<style>
    .info-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1;
        background: #fff;
        padding: 10px 14px;
        border-radius: 4px;
        box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        font: 13px/1.5 'Helvetica Neue', Arial, Helvetica, sans-serif;
    }
    .info-panel label {
        display: block;
        margin-top: 6px;
        cursor: pointer;
    }
</style>
<div id="map"></div>
<div class="info-panel">
    <strong>Translucent layer cache</strong>
    <p>The red square updates every 20ms.<br>Static base layers are cached.</p>
    <label>
        <input type="checkbox" id="toggle-cache" checked />
        Enable cache optimization
    </label>
</div>

<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    const places = {
        'type': 'FeatureCollection',
        'features': [
            {
                'type': 'Feature',
                'properties': {'icon': 'theatre'},
                'geometry': {'type': 'Point', 'coordinates': [-77.038659, 38.931567]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'theatre'},
                'geometry': {'type': 'Point', 'coordinates': [-77.003168, 38.894651]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'bar'},
                'geometry': {'type': 'Point', 'coordinates': [-77.090372, 38.881189]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'bicycle'},
                'geometry': {'type': 'Point', 'coordinates': [-77.052477, 38.943951]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'music'},
                'geometry': {'type': 'Point', 'coordinates': [-77.031706, 38.914581]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'music'},
                'geometry': {'type': 'Point', 'coordinates': [-77.020945, 38.878241]}
            },
            {
                'type': 'Feature',
                'properties': {'icon': 'music'},
                'geometry': {'type': 'Point', 'coordinates': [-77.007481, 38.876516]}
            }
        ]
    };

    const center = [-77.04, 38.907];

    function makeSquare(size) {
        const lon = center[0];
        const lat = center[1];
        return {
            'type': 'Feature',
            'geometry': {
                'type': 'Polygon',
                'coordinates': [[
                    [lon - size, lat - size],
                    [lon + size, lat - size],
                    [lon + size, lat + size],
                    [lon - size, lat + size],
                    [lon - size, lat - size]
                ]]
            }
        };
    }

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/bright',
        center,
        zoom: 11.15,
        optimizationFlagCacheFirstLayersRendering: true
    });

    map.on('load', () => {
        // Add symbol layers (static, will be cached)
        map.addSource('places', {
            'type': 'geojson',
            'data': places
        });

        places.features.forEach((feature) => {
            const symbol = feature.properties['icon'];
            const layerID = `poi-${symbol}`;

            if (!map.getLayer(layerID)) {
                map.addLayer({
                    'id': layerID,
                    'type': 'symbol',
                    'source': 'places',
                    'layout': {
                        'icon-image': `${symbol}_11`,
                        'icon-overlap': 'always',
                        'text-field': symbol,
                        'text-font': ['Noto Sans Regular'],
                        'text-size': 11,
                        'text-transform': 'uppercase',
                        'text-letter-spacing': 0.05,
                        'text-offset': [0, 1.5]
                    },
                    'paint': {
                        'text-color': '#202',
                        'text-halo-color': '#fff',
                        'text-halo-width': 2
                    },
                    'filter': ['==', ['get', 'icon'], symbol]
                });
            }
        });

        // Add a rapidly updating GeoJSON layer on top
        map.addSource('animated-square', {
            'type': 'geojson',
            'data': makeSquare(0.01)
        });

        map.addLayer({
            'id': 'animated-square-fill',
            'type': 'fill',
            'source': 'animated-square',
            'paint': {
                'fill-color': '#e55',
                'fill-opacity': 0.4
            }
        });

        map.addLayer({
            'id': 'animated-square-outline',
            'type': 'line',
            'source': 'animated-square',
            'paint': {
                'line-color': '#c33',
                'line-width': 2
            }
        });

        // Animate the square every 20ms
        setInterval(() => {
            const t = performance.now() / 1000;
            const size = 0.005 + 0.01 * (0.5 + 0.5 * Math.sin(t * 2));
            map.getSource('animated-square').setData(makeSquare(size));
        }, 20);
    });

    // Toggle the optimization
    document.getElementById('toggle-cache').addEventListener('change', (e) => {
        map.painter.translucentCacheEnabled = e.target.checked;
    });
</script>
</body>
</html>
