<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stress feature state</title>
    <meta property="og:description" content="Stress test for the feature test" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='../../dist/maplibre-gl.css' />
    <script src='../../dist/maplibre-gl-dev.js'></script>
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const CATS_COUNT = 10000;

    /**
     * Setting this value to 1e6 will make the zoom in/out or all operations requiring repainting
     * very laggy
     */
    const USELESS_FEATURE_STATES_COUNT = 1000000;

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [0, 0],
        zoom: 2
    });

    map.on('load', async () => {
        const features = [];
        const rdm = (amplitude) => {
            return amplitude * (Math.random() * 2 - 1);
        }
        for (let i=0; i<CATS_COUNT; ++i){
            features.push({
                'type': 'Feature',
                'id': i,
                'geometry': {
                    'type': 'Point',
                    'coordinates': [rdm(20), rdm(20)]
                }
            });
        }

        // add the cat icon:
        const image = await map.loadImage('https://upload.wikimedia.org/wikipedia/commons/7/7c/201408_cat.png');
        map.addImage('cat', image.data);
        map.addSource('point', {
            'type': 'geojson',
            'data': {
                'type': 'FeatureCollection',
                'features': features,
            }
        });

        map.addLayer({
            'id': 'cats',
            'type': 'symbol',
            'source': 'point',
            'layout': {
                'icon-overlap': 'always',
                'icon-image': 'cat',
                'icon-size': 0.1,
            },
            'paint': {
                'icon-opacity': [
                        'case',
                        ['boolean', ['feature-state', 'selected'], false],
                        1,
                        0.3
                    ]
            }
        });


        for (let k=0; k<USELESS_FEATURE_STATES_COUNT; ++k){
            map.setFeatureState(
                {source: 'point', id: `useless${k}` },
                {uselessProperty: ((k)%2 === 0)}
            );
        }

    });
</script>
</body>
</html>
