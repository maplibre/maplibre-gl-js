<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display a non-interactive map</title>
    <meta property="og:description" content="Disable interactivity to create a static map." />
    <meta property="og:created" content="2025-06-25" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='../../dist/maplibre-gl.css' />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    maplibregl.setWorkerUrl('../../dist/maplibre-gl-worker-dev.mjs');

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [74.5, 40],
        zoom: 3,
        // causes pan & zoom handlers not to be applied, similar to
        // .dragging.disable() and other handler .disable() functions in Leaflet.
        interactive: false
    });
</script>
</body>
</html>
