Repro of:
https://github.com/maplibre/maplibre-gl-js/issues/7535
https://jsfiddle.net/6k7wztrq/
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }
        #bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            background: #eee;
            z-index: 1;
        }
        #map {
            position: absolute;
            top: 40px;
            bottom: 0;
            left: 0;
            right: 0;
        }
        button {
            padding: 4px 12px;
        }
    </style>

    <script type="module">
        import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

        maplibregl.setWorkerUrl('../../dist/maplibre-gl-worker-dev.mjs');

        const ids = [1, 2, 3];
        const features = ids.map((id, i) => ({
            type: "Feature",
            id,
            geometry: {
                type: "Polygon",
                coordinates: [
                [
                    [i + 0.1, 0.1],
                    [i + 0.9, 0.1],
                    [i + 0.9, 0.9],
                    [i + 0.1, 0.9],
                    [i + 0.1, 0.1],
                ],
                ],
            },
            properties: {},
        }));

        const map = new maplibregl.Map({
            container: "map",
            bounds: [
                [0, 0],
                [5, 1],
            ],
            style: {
                version: 8,
                sources: {
                polygons: {
                    type: "geojson",
                    data: { type: "FeatureCollection", features },
                },
                },
                layers: [
                {
                    id: "bg",
                    type: "background",
                    paint: { "background-color": "#fff" },
                },
                {
                    id: "polygons",
                    type: "fill",
                    source: "polygons",
                    paint: {
                        "fill-color": ["coalesce", ["feature-state", "color"], "blue"],
                        "fill-outline-color": "black",
                    },
                },
                ],
            },
        });

        map.on("load", () => {
            document.getElementById("apply").onclick = () => {
                for (const id of ids) {
                    map.setFeatureState({ source: "polygons", id }, { color: "red" });
                }
            };

            document.getElementById("bug").onclick = () => {
                map.removeFeatureState({ source: "polygons" });
                for (const id of ids) {
                    map.setFeatureState({ source: "polygons", id }, { visible: true });
                }
                requestAnimationFrame(() => {
                    for (const id of ids) {
                        console.log(id, map.getFeatureState({ source: "polygons", id }));
                    }
                });
            };
        });
    </script>
</head>``

<body>

    <div id="bar">
    <button id="apply">1. set color=red on all</button>
    <button id="bug">2. bulk remove + per-id set(visible)</button>
    <span>Expected: all blue. Actual: first feature stays red.</span>
    </div>
    <div id="map"></div>
</body>
</html>
