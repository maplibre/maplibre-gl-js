<!DOCTYPE html>
<html lang="en">
<head>
    <title>MapLibre GL JS debug page</title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="about:blank">
    <link rel='stylesheet' href='../../../../dist/maplibre-gl.css' />
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>

<body>
<div id='map'></div>

<script type='module'>
import * as maplibregl from '../../../../dist/maplibre-gl-dev.mjs';

maplibregl.setWorkerUrl('../../../../dist/maplibre-gl-worker-dev.mjs');
window.maplibregl = maplibregl;

// `map` is read from `window` by the browser test; module scope doesn't expose it.
window.map = new maplibregl.Map({
    container: 'map',
    preserveDrawingBuffer: true,
    zoom: 1,
    fadeDuration: 0,
    center: [0, 0],
    style: {
        version: 8,
        sources: {
            land: {
                type: 'geojson',
                data: `${location.origin}/test/integration/browser/fixtures/land.json`
            }
        },
        layers: [
            {
                id: 'background',
                type: 'background',
                paint: {
                    'background-color': '#72d0f2'
                }
            },
            {
                id: 'land',
                type: 'fill',
                source: 'land',
                paint: {
                    'fill-color': '#f0e9e1'
                }
            }
        ]
    }
});
</script>

</body>
</html>
